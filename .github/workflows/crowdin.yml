name: Crowdin Sync

on:
  push:
    branches:
      - main
    paths:
      - "src/messages/**"
      - "crowdin.yml"
  workflow_dispatch:

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Synchronize with Crowdin
        uses: crowdin/github-action@v2
        with:
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          source: src/messages/cs.json
          translation: src/messages/%two_letters_code%.json
          base_path: .
          base_url: https://api.crowdin.com
          upload_sources: true
          upload_translations: false
          download_translations: true
          create_pull_request: true
          localization_branch_name: l10n_public-alfa
          pull_request_title: "chore(i18n): update translations from Crowdin"
          pull_request_body: "Automated translation sync from Crowdin."
          pull_request_base_branch_name: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
